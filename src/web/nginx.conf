server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Proxy para InterSCity UFMA — elimina CORS e erro de certificado SSL no browser
    location /api/ic/ {
        proxy_pass         https://cidadesinteligentes.lsdi.ufma.br/interscity_lh/;
        proxy_ssl_verify   off;
        proxy_ssl_server_name on;
        proxy_set_header   Host cidadesinteligentes.lsdi.ufma.br;
        proxy_set_header   Accept "application/json";
        proxy_connect_timeout 10s;
        proxy_read_timeout    15s;
        add_header Access-Control-Allow-Origin * always;
    }

    # Proxy WebSocket MQTT. No Docker Compose aponta para Mosquitto; no
    # Kubernetes o Ingress pode rotear /mqtt diretamente para EMQX.
    location /mqtt {
        proxy_pass         http://mosquitto:9001/mqtt;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }
}

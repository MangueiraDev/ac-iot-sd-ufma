apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge
  namespace: ac-iot
spec:
  replicas: 4
  selector:
    matchLabels:
      app: bridge
  template:
    metadata:
      labels:
        app: bridge
    spec:
      containers:
        - name: bridge
          image: ac-iot-sd-ufma-bridge:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MQTT_BROKER
              value: emqx.ac-iot.svc.cluster.local
            - name: MQTT_TOPIC
              value: "$share/bridge-workers/ac-iot/+/sensores"
            - name: CONFIG_PATH
              value: /config/rooms.yaml
          envFrom:
            - configMapRef:
                name: ac-iot-config
          volumeMounts:
            - name: rooms
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: rooms
          configMap:
            name: rooms-yaml
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bridge-hpa
  namespace: ac-iot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bridge
  minReplicas: 4
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

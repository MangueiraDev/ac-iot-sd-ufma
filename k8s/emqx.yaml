apiVersion: v1
kind: Service
metadata:
  name: emqx-headless
  namespace: ac-iot
spec:
  clusterIP: None
  selector:
    app: emqx
  ports:
    - name: mqtt
      port: 1883
      targetPort: mqtt
    - name: mqttws
      port: 8083
      targetPort: mqttws
---
apiVersion: v1
kind: Service
metadata:
  name: emqx
  namespace: ac-iot
spec:
  selector:
    app: emqx
  ports:
    - name: mqtt
      port: 1883
      targetPort: mqtt
    - name: mqttws
      port: 8083
      targetPort: mqttws
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: emqx
  namespace: ac-iot
spec:
  serviceName: emqx-headless
  replicas: 3
  selector:
    matchLabels:
      app: emqx
  template:
    metadata:
      labels:
        app: emqx
    spec:
      containers:
        - name: emqx
          image: emqx/emqx:5
          ports:
            - name: mqtt
              containerPort: 1883
            - name: mqttws
              containerPort: 8083
            - name: dashboard
              containerPort: 18083
          env:
            - name: EMQX_CLUSTER__DISCOVERY_STRATEGY
              value: k8s
            - name: EMQX_CLUSTER__K8S__SERVICE_NAME
              value: emqx-headless
          readinessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ac-iot
  namespace: ac-iot
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  rules:
    - host: ac-iot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
          - path: /mqtt
            pathType: Prefix
            backend:
              service:
                name: emqx
                port:
                  number: 8083

<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
          </marker>
        </defs>
        <rect width="1000" height="360" fill="#f8fbff"/>
        <text x="40" y="42" font-family="Arial" font-size="24" font-weight="700" fill="#102039">Ciclo metodológico do projeto</text>
        <g font-family="Arial" font-size="16" fill="#102039">
          <rect x="55" y="95" width="170" height="82" rx="6" fill="#dbeafe" stroke="#2563eb"/>
          <text x="82" y="128" font-weight="700">1. Modelagem</text>
          <text x="83" y="153" font-size="13">salas, UUIDs e capabilities</text>
          <rect x="300" y="95" width="170" height="82" rx="6" fill="#dcfce7" stroke="#16a34a"/>
          <text x="333" y="128" font-weight="700">2. Simulação</text>
          <text x="326" y="153" font-size="13">sensores e automação</text>
          <rect x="545" y="95" width="170" height="82" rx="6" fill="#fef3c7" stroke="#d97706"/>
          <text x="584" y="128" font-weight="700">3. Integração</text>
          <text x="574" y="153" font-size="13">MQTT, Node-RED e Web</text>
          <rect x="790" y="95" width="170" height="82" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
          <text x="822" y="128" font-weight="700">4. InterSCity</text>
          <text x="818" y="153" font-size="13">catalog, adaptor, collector</text>
          <rect x="300" y="235" width="415" height="70" rx="6" fill="#fee2e2" stroke="#dc2626"/>
          <text x="385" y="265" font-weight="700">5. Validação e documentação final</text>
          <text x="370" y="289" font-size="13">evidências, métricas, limitações e resultados</text>
        </g>
        <line x1="225" y1="136" x2="295" y2="136" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
        <line x1="470" y1="136" x2="540" y2="136" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
        <line x1="715" y1="136" x2="785" y2="136" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
        <path d="M875 177 C875 245, 735 270, 722 270" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
        <path d="M300 270 C160 270, 140 208, 140 180" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
      </svg>
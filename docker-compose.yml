# AC-IoT SD UFMA — stack principal
# Plataforma InterSCity: cidadesinteligentes.lsdi.ufma.br (remota, não local)
# Para adicionar salas: edite config/rooms.yaml — sem recompilar.

services:

  # ── Broker MQTT (TCP 1883 + WebSocket 9001) ────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: ac_iot_mosquitto
    ports:
      - "1883:1883"   # MQTT TCP (simulator, bridge, Node-RED)
      - "9001:9001"   # MQTT WebSocket (dashboard browser)
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t _health -m ok -q 0"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Simulador de sensores IoT (rooms carregados do YAML) ──────────────────
  simulator:
    build:
      context: ./src/simulator
    container_name: ac_iot_simulator
    volumes:
      - ./config:/config:ro
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - PUBLISH_INTERVAL=30       # segundos entre publicações
      - CONFIG_PATH=/config/rooms.yaml
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  # ── Bridge MQTT → InterSCity UFMA (pipeline assíncrono, sem bloquear MQTT) ─
  bridge:
    build:
      context: ./src/bridge
    container_name: ac_iot_bridge
    volumes:
      - ./config:/config:ro
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=ac-iot/+/sensores
      - INTERSCITY_BASE_URL=https://cidadesinteligentes.lsdi.ufma.br/interscity_lh
      - INTERSCITY_SSL_VERIFY=false
      - CONFIG_PATH=/config/rooms.yaml
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  # ── Dashboard web em tempo real (Nginx serve static) ──────────────────────
  web:
    image: nginx:alpine
    container_name: ac_iot_web
    ports:
      - "8080:80"     # Acesso: http://localhost:8080
    volumes:
      - ./src/web/static:/usr/share/nginx/html:ro
      - ./src/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Node-RED (opcional — automações avançadas) ────────────────────────────
  nodered:
    image: nodered/node-red:latest
    container_name: ac_iot_nodered
    ports:
      - "1880:1880"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./docker/nodered/data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - nodered   # docker compose --profile nodered up -d

volumes:
  mosquitto_data:
  mosquitto_log:

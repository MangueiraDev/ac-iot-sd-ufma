services:
  # ──────────────────────────────────────────────
  # Broker MQTT – Eclipse Mosquitto 2.x
  # ──────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: ac_iot_mosquitto
    ports:
      - "1883:1883" # MQTT padrão
      - "9001:9001" # WebSockets (usado pelo Node-RED Dashboard)
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "timeout 2s mosquitto_sub -t 'test' -C 1 -E -i healthcheck || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────
  # Middleware / Dashboard – Node-RED
  # ──────────────────────────────────────────────
  nodered:
    image: nodered/node-red:latest
    container_name: ac_iot_nodered
    ports:
      - "1880:1880"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./docker/nodered/data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Simulador ESP32 (Python)
  # ──────────────────────────────────────────────
  simulador:
    build:
      context: ./simulador
    container_name: ac_iot_simulador
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - PUBLISH_INTERVAL=5
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
  # ──────────────────────────────────────────────
  # InterSCity Local Bridge
  # ──────────────────────────────────────────────
  # interscity:
  #   build:
  #     context: ./interscity
  #   container_name: ac_iot_interscity
  #   ports:
  #     - "5000:5000"
  #   env_file:
  #     - ./interscity/.env
  #   depends_on:
  #     mosquitto:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
